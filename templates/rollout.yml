apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: kubeserve-bluegreen
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubeserve
  template:
    metadata:
      labels:
        app: kubeserve
    spec:
      containers:
        - name: c1
          image: leaddevops/kubeserve:v1
  strategy:
    blueGreen:
      activeService: kubeserve-active
      previewService: kubeserve-preview
      autoPromotionEnabled: false
